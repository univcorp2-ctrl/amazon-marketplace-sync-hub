<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="t d"><title id="t">Amazon Marketplace Sync Hub architecture</title><desc id="d">Amazon SP-API data flows through FastAPI, rights validation, SQLite, and rate-limited synchronization to Shopee and Qoo10.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#17365c"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-opacity=".25"/></filter></defs><rect width="1400" height="620" rx="32" fill="url(#bg)"/><text x="64" y="78" fill="#48d597" font-family="Arial,sans-serif" font-size="18" font-weight="700" letter-spacing="3">COMPLIANCE-FIRST API AUTOMATION</text><text x="64" y="130" fill="#edf5ff" font-family="Arial,sans-serif" font-size="42" font-weight="800">Amazon → Shopee / Qoo10</text><text x="64" y="168" fill="#9cb0c9" font-family="Arial,sans-serif" font-size="19">Catalog ingestion, rights gate, safe pricing and availability synchronization</text><g filter="url(#s)" font-family="Arial,sans-serif"><rect x="65" y="230" width="230" height="170" rx="22" fill="#0f1d30" stroke="#355273"/><text x="180" y="275" text-anchor="middle" fill="#ffbf5f" font-size="22" font-weight="800">Amazon SP-API</text><text x="180" y="314" text-anchor="middle" fill="#edf5ff" font-size="17">Catalog Items</text><text x="180" y="343" text-anchor="middle" fill="#edf5ff" font-size="17">Product Pricing</text><text x="180" y="372" text-anchor="middle" fill="#9cb0c9" font-size="15">LWA • rate limited • cached</text><rect x="375" y="210" width="310" height="210" rx="22" fill="#0f1d30" stroke="#4ba3ff" stroke-width="2"/><text x="530" y="258" text-anchor="middle" fill="#4ba3ff" font-size="23" font-weight="800">FastAPI Orchestrator</text><text x="530" y="302" text-anchor="middle" fill="#edf5ff" font-size="17">Normalize + preserve raw JSON</text><text x="530" y="334" text-anchor="middle" fill="#edf5ff" font-size="17">Price rules + safety stock</text><text x="530" y="366" text-anchor="middle" fill="#edf5ff" font-size="17">Audit + scheduled sync</text><rect x="760" y="200" width="250" height="105" rx="20" fill="#13283e" stroke="#48d597" stroke-width="2"/><text x="885" y="242" text-anchor="middle" fill="#48d597" font-size="21" font-weight="800">Rights Gate</text><text x="885" y="274" text-anchor="middle" fill="#edf5ff" font-size="15">Confirm ownership / license</text><rect x="760" y="330" width="250" height="105" rx="20" fill="#13283e" stroke="#355273"/><text x="885" y="372" text-anchor="middle" fill="#9cb0c9" font-size="21" font-weight="800">SQLite + Cache</text><text x="885" y="404" text-anchor="middle" fill="#edf5ff" font-size="15">Products • listings • sync runs</text><rect x="1090" y="205" width="240" height="95" rx="20" fill="#0f1d30" stroke="#ff8f5b"/><text x="1210" y="248" text-anchor="middle" fill="#ff8f5b" font-size="23" font-weight="800">Shopee</text><text x="1210" y="276" text-anchor="middle" fill="#edf5ff" font-size="15">add item • price • stock</text><rect x="1090" y="335" width="240" height="95" rx="20" fill="#0f1d30" stroke="#7ba9ff"/><text x="1210" y="378" text-anchor="middle" fill="#7ba9ff" font-size="23" font-weight="800">Qoo10</text><text x="1210" y="406" text-anchor="middle" fill="#edf5ff" font-size="15">SetNewGoods • SetGoodsPrice</text></g><g stroke="#4ba3ff" stroke-width="5" fill="none" stroke-linecap="round"><path d="M295 315H375"/><path d="M685 270H760"/><path d="M1010 252H1090"/><path d="M1010 383H1090"/></g><g fill="#4ba3ff"><path d="M365 303l18 12-18 12z"/><path d="M750 258l18 12-18 12z"/><path d="M1080 240l18 12-18 12z"/><path d="M1080 371l18 12-18 12z"/></g><rect x="65" y="485" width="1265" height="74" rx="18" fill="#0b1728" stroke="#263a55"/><text x="92" y="520" fill="#ffbf5f" font-family="Arial,sans-serif" font-size="17" font-weight="700">SAFE AVAILABILITY MODEL</text><text x="92" y="547" fill="#edf5ff" font-family="Arial,sans-serif" font-size="16">Amazon exact retail quantity is not exposed → infer offer availability → publish a conservative buffer quantity → set zero when offers disappear.</text></svg>