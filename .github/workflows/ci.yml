name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest --junitxml=junit.xml
      - name: Build Pages
        run: python scripts/build_pages.py
      - name: Upload test and Pages artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amazon-marketplace-sync-hub-ci
          path: |
            junit.xml
            dist/
          if-no-files-found: warn
